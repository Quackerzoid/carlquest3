<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carl Quest Sports</title>
    <style>
      /* Angular esports identity (autoplay redesign, spec §5 — deliberate, project-wide):
         broadcast lower-thirds over the field. Cold dark GLASS slabs with hard diagonal
         corner cuts (clip-path), condensed uppercase display type on a system stack, the
         two kit colours — navy #22345e / maroon #7a2231 — as hard-stop accent slashes
         (never soft gradients), and ONE hot signal colour (amber) for wins and highlights;
         failures go cold steel. The dice-roll banner is the star. Parchment is retired. */
      :root {
        --glass: rgba(10, 13, 22, 0.82);
        --glass-deep: rgba(7, 9, 15, 0.93);
        --dim: rgba(5, 7, 12, 0.62);
        --ink: #edf1f9;
        --muted: #8b94ab;
        --faint: #5a6377;
        --line: rgba(148, 163, 199, 0.28);
        --line-hard: rgba(148, 163, 199, 0.55);
        --navy: #22345e;
        --navy-bright: #3d5ca6;
        --maroon: #7a2231;
        --maroon-bright: #b03a4d;
        --hot: #ffc63f;
        --hot-ink: #171204;
        --steel: #6f7a94;
        --display: 'Arial Narrow', 'Helvetica Neue Condensed', 'Roboto Condensed',
          'Liberation Sans Narrow', 'Segoe UI', Arial, sans-serif;
        /* The team slash: hard stop navy → maroon on a diagonal, used as a thin bar. */
        --team-slash: linear-gradient(104deg, var(--navy-bright) 0 55%, var(--maroon-bright) 55% 100%);
      }

      html, body { margin: 0; height: 100%; overflow: hidden; background: #05070c; }
      #app { width: 100%; height: 100%; display: block; }

      /* Slab idiom shared by every panel: glass, hairline edge, opposing corner cuts,
         and a team-slash top bar. */
      .slab {
        position: relative;
        background: var(--glass);
        backdrop-filter: blur(8px) saturate(1.15);
        border: 1px solid var(--line);
        clip-path: polygon(
          0 0, calc(100% - 16px) 0, 100% 16px,
          100% 100%, 16px 100%, 0 calc(100% - 16px)
        );
      }
      .slab::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: var(--team-slash);
        pointer-events: none;
      }

      /* --- HUD: match board + feed + legend + roll banners + result. --- */
      #hud {
        font-family: var(--display);
        font-stretch: condensed;
        color: var(--ink);
      }
      #hud[hidden] { display: none; }

      #hud-left {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 21em;
        max-width: calc(100vw - 24px);
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-size: 13px;
      }
      #hud-board[hidden] { display: none; }
      .board-head {
        display: flex;
        justify-content: space-between;
        gap: 0.6em;
        padding: 0.65em 1em 0.5em;
        border-bottom: 1px solid var(--line);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-size: 0.82em;
        font-weight: 700;
      }
      #board-you { color: var(--muted); font-weight: 400; letter-spacing: 0.12em; }
      #board-score {
        padding: 0.18em 0.55em 0.05em;
        font-size: 2.1em;
        font-weight: 700;
        letter-spacing: 0.08em;
        font-variant-numeric: tabular-nums;
        text-transform: uppercase;
      }
      #board-badges { padding: 0 1em; min-height: 1.3em; }
      .board-badge {
        display: inline-block;
        margin-right: 0.6em;
        padding: 0.1em 0.55em;
        transform: skewX(-10deg);
        background: rgba(255, 198, 63, 0.16);
        border: 1px solid var(--hot);
        color: var(--hot);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-size: 0.78em;
        font-weight: 700;
      }
      #board-rows { padding: 0.35em 1em 0.7em; }
      .board-row {
        display: flex;
        align-items: baseline;
        gap: 0.6em;
        padding: 0.22em 0;
        border-bottom: 1px solid rgba(148, 163, 199, 0.14);
      }
      .board-row:last-child { border-bottom: none; }
      .board-label {
        order: 1;
        color: var(--muted);
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.82em;
      }
      .board-row::after { content: ''; order: 2; flex: 1; }
      .board-value { order: 3; text-align: right; white-space: nowrap; letter-spacing: 0.04em; }

      /* --- Event feed: broadcast ticker lines under the board. --- */
      #hud-feed {
        margin: 0;
        padding: 0;
        list-style: none;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      .feed-entry {
        padding: 0.28em 0.6em;
        margin-bottom: 2px;
        color: var(--ink);
        background: var(--glass);
        border-left: 3px solid var(--navy-bright);
        clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 100%, 0 100%);
      }
      .feed-entry:nth-child(even) { border-left-color: var(--maroon-bright); }
      .feed-entry:nth-child(2) { opacity: 0.85; }
      .feed-entry:nth-child(3) { opacity: 0.7; }
      .feed-entry:nth-child(4) { opacity: 0.55; }
      .feed-entry:nth-child(5) { opacity: 0.4; }
      .feed-entry:nth-child(6) { opacity: 0.3; }

      /* --- Roll banners: the dice moments, centre-top, max two stacked. --- */
      #roll-banners {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        z-index: 30;
        pointer-events: none;
        max-width: calc(100vw - 24px);
      }
      .roll-banner {
        display: flex;
        align-items: stretch;
        background: var(--glass-deep);
        border: 1px solid var(--line-hard);
        clip-path: polygon(14px 0, 100% 0, calc(100% - 14px) 100%, 0 100%);
        font-size: 17px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        white-space: nowrap;
        animation: roll-flash 1.4s ease forwards;
      }
      .roll-contest {
        display: flex;
        align-items: center;
        padding: 0.4em 0.9em 0.4em 1.1em;
        font-size: 0.7em;
        letter-spacing: 0.22em;
      }
      .roll-banner.is-success .roll-contest { background: var(--hot); color: var(--hot-ink); }
      .roll-banner.is-fail .roll-contest { background: var(--steel); color: #10131b; }
      .roll-text { padding: 0.4em 1.2em 0.4em 0.9em; }
      .roll-banner.is-success .roll-text { color: var(--ink); text-shadow: 0 0 14px rgba(255, 198, 63, 0.35); }
      .roll-banner.is-fail .roll-text { color: var(--muted); }
      @keyframes roll-flash {
        0% { opacity: 0; transform: translateY(-12px) skewX(-2deg); }
        8% { opacity: 1; transform: none; }
        82% { opacity: 1; }
        100% { opacity: 0; transform: translateY(4px); }
      }

      /* --- Key legend: bottom-centre strip, parallelogram cut. --- */
      #hud-legend {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        max-width: calc(100vw - 20px);
        padding: 0.5em 1.6em;
        background: var(--glass);
        border: 1px solid var(--line);
        clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        overflow-x: auto;
      }
      #hud-legend:empty { display: none; }
      .legend-item { color: var(--faint); margin-right: 1.3em; }
      .legend-item:last-child { margin-right: 0; }
      .legend-item.is-lit { color: var(--ink); }
      .legend-item.is-lit .legend-key { color: var(--hot); font-weight: 700; }
      .legend-hint { letter-spacing: 0.06em; }
      .legend-notice {
        color: var(--hot);
        letter-spacing: 0.2em;
        font-weight: 700;
      }

      /* --- Result overlay: full-screen dim, one wide slab. --- */
      #hud-result {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--dim);
      }
      #hud-result[hidden] { display: none; }
      #result-card {
        width: 24em;
        max-width: 90vw;
        text-align: center;
        padding: 1.3em 1.8em 1.5em;
      }
      #result-card .result-heading {
        letter-spacing: 0.24em;
        text-transform: uppercase;
        font-size: 0.82em;
        font-weight: 700;
        color: var(--muted);
        border-bottom: 1px solid var(--line);
        padding-bottom: 0.7em;
        margin-bottom: 0.8em;
      }
      #result-score {
        font-size: 3em;
        font-weight: 700;
        letter-spacing: 0.08em;
        font-variant-numeric: tabular-nums;
        margin: 0.1em 0;
      }
      #result-winner {
        display: inline-block;
        margin: 0.4em 0 0.3em;
        padding: 0.15em 0.9em;
        transform: skewX(-10deg);
        background: var(--hot);
        color: var(--hot-ink);
        letter-spacing: 0.26em;
        text-transform: uppercase;
        font-weight: 700;
      }
      #result-winner:empty { display: none; }
      #result-line { color: var(--muted); font-size: 0.85em; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1.2em; }
      #result-actions { display: flex; gap: 0.8em; justify-content: center; }

      /* Shared button idiom (lobby + result): cut glass chip; amber on hover. */
      .card-button {
        font-family: var(--display);
        font-stretch: condensed;
        font-size: 0.85em;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink);
        background: rgba(61, 92, 166, 0.22);
        border: 1px solid var(--line-hard);
        clip-path: polygon(9px 0, 100% 0, calc(100% - 9px) 100%, 0 100%);
        padding: 0.6em 1.5em;
        cursor: pointer;
      }
      .card-button:hover { background: var(--hot); color: var(--hot-ink); border-color: var(--hot); }
      .card-button:disabled {
        opacity: 0.4;
        cursor: default;
        background: rgba(61, 92, 166, 0.22);
        color: var(--ink);
        border-color: var(--line-hard);
      }

      /* --- Lobby: the title card — big plate, two clear paths. --- */
      #lobby {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--dim);
        font-family: var(--display);
        font-stretch: condensed;
        color: var(--ink);
      }
      #lobby[hidden] { display: none; }
      #lobby-card {
        width: 26em;
        max-width: 90vw;
        padding: 1.6em 1.9em 1.5em;
      }
      #lobby-card .title {
        margin: 0;
        font-size: 1.7em;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-align: center;
        white-space: nowrap;
      }
      #lobby-card .subtitle {
        margin: 0.5em 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 0.78em;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        padding-bottom: 1em;
        /* Team slash under the title plate instead of a plain rule. */
        background: var(--team-slash) bottom / 100% 3px no-repeat;
      }
      .lobby-path { margin-top: 1.2em; }
      .lobby-path .path-label {
        color: var(--muted);
        font-size: 0.78em;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 0 0 0.55em;
      }
      .lobby-divider {
        display: flex;
        align-items: center;
        gap: 0.9em;
        color: var(--faint);
        font-size: 0.78em;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 1.2em;
      }
      .lobby-divider::before,
      .lobby-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--line); }
      #lobby-create { width: 100%; }
      .lobby-row { display: flex; gap: 0.6em; }
      #join-code {
        flex: 1;
        font-family: var(--display);
        font-stretch: condensed;
        font-size: 1.2em;
        font-weight: 700;
        letter-spacing: 0.35em;
        text-align: center;
        text-transform: uppercase;
        color: var(--hot);
        background: rgba(7, 9, 15, 0.7);
        border: 1px solid var(--line-hard);
        clip-path: polygon(7px 0, 100% 0, calc(100% - 7px) 100%, 0 100%);
        padding: 0.4em;
        width: 5em;
        outline: none;
      }
      #join-code:focus { border-color: var(--hot); }
      #join-code::placeholder { color: var(--faint); letter-spacing: 0.35em; }
      #lobby-waiting { display: none; text-align: center; margin-top: 1.2em; }
      #lobby-waiting .cue {
        color: var(--muted);
        font-size: 0.78em;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 0 0 0.2em;
      }
      #lobby-waiting .code {
        font-size: 3em;
        font-weight: 700;
        letter-spacing: 0.4em;
        color: var(--hot);
        margin: 0.15em 0 0.1em;
        /* Optical centring: letter-spacing trails the last glyph. */
        padding-left: 0.4em;
      }
      #lobby-waiting .hint { color: var(--muted); font-size: 0.8em; letter-spacing: 0.12em; text-transform: uppercase; }
      #lobby-error { color: var(--maroon-bright); font-size: 0.82em; letter-spacing: 0.08em; min-height: 1.2em; margin: 1em 0 0; }

      /* --- Draft sheet / positioning panel: the roster ledger, pinned right. --- */
      .draft-sheet {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 27em;
        max-width: calc(100vw - 24px);
        max-height: calc(100vh - 24px);
        overflow-y: auto;
        font-family: var(--display);
        font-stretch: condensed;
        color: var(--ink);
        font-size: 12px;
      }
      .draft-sheet[hidden] { display: none; }
      .draft-sheet-heading {
        padding: 0.75em 1em 0.6em;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-size: 0.95em;
        font-weight: 700;
        border-bottom: 1px solid var(--line);
      }
      .draft-sheet-rows { display: flex; flex-direction: column; }
      .draft-row {
        display: grid;
        grid-template-columns: 5.5em 1fr 5.8em;
        align-items: baseline;
        gap: 0.6em;
        width: 100%;
        font-family: var(--display);
        font-stretch: condensed;
        font-size: 1em;
        text-align: left;
        color: var(--ink);
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(148, 163, 199, 0.14);
        border-left: 3px solid transparent;
        padding: 0.5em 0.9em;
        cursor: pointer;
      }
      .draft-row[hidden] { display: none; }
      .draft-row:last-child { border-bottom: none; }
      .draft-row:disabled { cursor: default; }
      .draft-row:not(:disabled):hover {
        background: rgba(61, 92, 166, 0.28);
        border-left-color: var(--navy-bright);
      }
      .draft-row-name {
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 700;
      }
      .draft-row-wide { grid-column: 1 / -1; }
      .draft-row-stats { color: var(--muted); font-size: 0.92em; letter-spacing: 0.02em; }
      .draft-row-badge {
        text-align: right;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 0.85em;
        color: var(--muted);
      }
      .draft-row.is-taken { opacity: 0.38; }
      .draft-row.is-taken .draft-row-badge { color: var(--ink); opacity: 1; }
      .draft-row.is-selected {
        background: rgba(255, 198, 63, 0.14);
        border-left-color: var(--hot);
      }
      .draft-row.is-selected .draft-row-badge { color: var(--hot); }

      /* Bench/parked section marker: a hatched divider row, same ledger. */
      .draft-sheet-section {
        padding: 0.55em 0.9em 0.4em;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-size: 0.78em;
        font-weight: 700;
        color: var(--muted);
        border-top: 1px solid var(--line-hard);
        border-bottom: 1px solid rgba(148, 163, 199, 0.14);
        background: repeating-linear-gradient(
          -55deg,
          rgba(148, 163, 199, 0.06) 0 6px,
          transparent 6px 12px
        );
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="draft" class="slab" hidden></div>

    <div id="hud" hidden>
      <div id="hud-left">
        <section id="hud-board" class="slab" hidden>
          <div class="board-head"><span id="board-phase"></span><span id="board-you"></span></div>
          <div id="board-score"></div>
          <div id="board-badges"></div>
          <div id="board-rows"></div>
        </section>
        <ol id="hud-feed"></ol>
      </div>
      <div id="roll-banners"></div>
      <div id="hud-legend"></div>
      <div id="hud-result" hidden>
        <div id="result-card" class="slab">
          <div class="result-heading">Carl Quest Sports — final score</div>
          <div id="result-score"></div>
          <div id="result-winner"></div>
          <div id="result-line"></div>
          <div id="result-actions">
            <button id="result-rematch" class="card-button" type="button">Rematch</button>
            <button id="result-leave" class="card-button" type="button">Leave</button>
          </div>
        </div>
      </div>
    </div>

    <div id="lobby">
      <div id="lobby-card" class="slab">
        <h1 class="title">Carl Quest Sports</h1>
        <p class="subtitle">two-player rounders</p>

        <div id="lobby-setup">
          <div class="lobby-path">
            <p class="path-label">start a match</p>
            <button id="lobby-create" class="card-button" type="button">Create match</button>
          </div>
          <div class="lobby-divider">or</div>
          <div class="lobby-path">
            <p class="path-label">join with a code</p>
            <div class="lobby-row">
              <input id="join-code" type="text" maxlength="4" placeholder="CODE" autocomplete="off" />
              <button id="lobby-join" class="card-button" type="button">Join</button>
            </div>
          </div>
        </div>

        <div id="lobby-waiting">
          <p class="cue">share this code with your opponent</p>
          <div class="code" id="lobby-code">----</div>
          <p class="hint">waiting for opponent…</p>
        </div>

        <p id="lobby-error"></p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
